# docker compose up --build
# Один образ mvidia; два контейнера — user (3001) и admin (3002). Настройки — в .env

services:
  user:
    image: ${MVIDIA_IMAGE:-antirek/mvidia:0.0.7}
    build: .
    command: ["node", "packages/api-user/src/server.js"]
    ports:
      - "${API_USER_PORT:-3001}:${API_USER_PORT:-3001}"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://host.docker.internal:27017/mvidia
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads

  admin:
    image: ${MVIDIA_IMAGE:-antirek/mvidia:0.0.7}
    command: ["node", "packages/api-admin/src/server.js"]
    ports:
      - "${API_ADMIN_PORT:-3002}:${API_ADMIN_PORT:-3002}"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://host.docker.internal:27017/mvidia
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads

volumes:
  uploads:
