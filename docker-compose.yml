# docker compose up --build
# Mongo на хосте (как у вас локально). Настройки приложения — в .env

services:
  user:
    build:
      context: .
      target: api-user
    ports:
      - "3001:3001"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGODB_URI: mongodb://host.docker.internal:27017/mvidia
      UPLOAD_DIR: /data/uploads
      SERVE_UI: "true"
      UI_DIST_PATH: /app/ui
      PORT: "3001"
    volumes:
      - uploads:/data/uploads

  admin:
    build:
      context: .
      target: api-admin
    ports:
      - "3002:3002"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MONGODB_URI: mongodb://host.docker.internal:27017/mvidia
      UPLOAD_DIR: /data/uploads
      SERVE_UI: "true"
      UI_DIST_PATH: /app/ui
      PORT: "3002"
    volumes:
      - uploads:/data/uploads

volumes:
  uploads:
