# docker compose up --build
# Переменные — в .env (см. .env.example)

services:
  user:
    build:
      context: .
      target: api-user
      args:
        USER_PUBLIC_SITE_URL: ${USER_PUBLIC_SITE_URL:-http://localhost:3001}
    ports:
      - "${API_USER_PORT:-3001}:${API_USER_PORT:-3001}"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://host.docker.internal:27017/mvidia
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads

  admin:
    build:
      context: .
      target: api-admin
      args:
        USER_PUBLIC_SITE_URL: ${USER_PUBLIC_SITE_URL:-http://localhost:3001}
    ports:
      - "${API_ADMIN_PORT:-3002}:${API_ADMIN_PORT:-3002}"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://host.docker.internal:27017/mvidia
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads

volumes:
  uploads:
